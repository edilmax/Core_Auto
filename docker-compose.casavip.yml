# Casa VIP - stack di produzione: nginx (unico esposto) -> app (stdlib).
# Self-healing: restart automatico + healthcheck + depends_on service_healthy.
version: "2.4"          # compatibile con docker-compose v1 (la chiave 'name:' e' solo v2 -> rendeva il file invalido)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.casavip
    image: casavip-app
    container_name: casavip_app
    restart: unless-stopped
    env_file: .env.casavip            # crea da .env.casavip.example (segreti)
    environment:
      HOST: "0.0.0.0"
      PORTA: "8080"
      BASE_URL: "https://bookinvip.com"   # dominio assoluto per link email/voucher/sitemap/SEO
      PAGAMENTO_BPS: "300"           # costo carta 3% a carico host (copre Stripe -> noi mai in perdita)
      DB_CATALOGO: /data/catalogo.db
      DB_INVENTARIO: /data/inventario.db
      DB_REGISTRO_HOST: /data/registro_host.db   # account host self-service (durevole)
      DB_VIRAL: /data/viral.db                   # crediti referral (durevole)
      DB_DOMANDA: /data/domanda.db               # waitlist cold-start (durevole) - ERA MANCANTE -> scritture KO
      DB_MESSAGGI: /data/messaggi.db             # messaggistica (durevole)
      DB_GARANZIA: /data/garanzia.db             # escrow di garanzia (durevole)
      DB_PENDENTI: /data/pendenti.db             # hold pagamento / su-richiesta (durevole)
      DB_TASSA_COMUNALE: /data/tassa_comunale.db # ledger tassa di soggiorno (durevole)
      UPLOAD_DIR: /data/uploads                  # foto alloggi caricate dagli host (durevole)
      DB_PAYOUT: /data/payout.db                 # dashboard payout host (durevole)
      DB_ADMIN_ACCOUNTS: /data/admin_accounts.db # operatori admin con ruoli (fase192, durevole)
      DB_ACCETTAZIONI: /data/accettazioni.db     # prove FIRMATE d'accettazione contratto host (durevole = valore legale)
      DB_MARCHE: /data/marche.db                 # marche temporali RFC 3161 (durevole = valore legale: senza questa riga i token finirebbero in /app/data, cancellata a OGNI deploy)
      DB_RECENSIONI: /data/recensioni.db       # voti degli ospiti (durevole) - ERA MANCANTE -> le recensioni sparivano a ogni deploy
      DB_CREDITO_USATI: /data/credito_usati.db # crediti gia' spesi (durevole) - ERA MANCANTE -> un credito era rispendibile dopo un riavvio
      DB_FINANZA: /data/finanza.db             # libro giornale immutabile (durevole = valore legale e fiscale)
      DB_KYC: /data/kyc.db                     # esiti verifica identita' (durevole, mai documenti)
      DB_CHECKIN: /data/checkin.db             # check-in digitale (durevole)
      DB_SPLIT: /data/split.db                 # pagamenti di gruppo (durevole)
      DB_CODA: /data/coda.db                   # coda intelligente con depositi (durevole)
      FILE_REFERRAL: /data/referral.json         # referral host (durevole)
      CAMPAGNA_STATO_FILE: /data/campagna_stato.json   # scheduler no-burst (durevole)
      OUTREACH_OPTOUT_FILE: /data/outreach_optout.json # opt-out (durevole = obbligo legale)
      STATIC_DIR: /app/deploy
    volumes:
      - casavip_data:/data            # SQLite persistente
    networks:
      - interna                       # rete isolata: solo nginx puo' raggiungere app
    expose:
      - "8080"                        # solo rete interna, NON esposto sull'host
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/api/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: casavip_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - interna
    volumes:
      - ./deploy/nginx.casavip.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

  # Backup automatico (snapshot consistente + retention) ogni 6 ore. Riusa l'immagine app.
  backup:
    image: casavip-app
    container_name: casavip_backup
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do sh deploy/backup_casavip.sh; sleep 21600; done"]
    environment:
      DATA_DIR: /data
      BACKUP_DIR: /data/backup
    volumes:
      - casavip_data:/data
    networks:
      - interna
    # L'immagine casavip-app ha un HEALTHCHECK che interroga la porta 8080, ma qui
    # non gira nessun server -> il container risultava 'unhealthy' per sempre (falso
    # allarme che maschera i guasti veri). Controllo giusto: l'ultimo backup e' fresco?
    # (giro ogni 6h -> rosso se il piu' recente ha piu' di 7h).
    healthcheck:
      test: ["CMD", "python", "-c", "import glob,os,sys,time; f=glob.glob('/data/backup/*.gz'); sys.exit(0 if f and time.time()-max(map(os.path.getmtime,f))<25200 else 1)"]
      interval: 10m
      timeout: 10s
      retries: 3
      start_period: 3m

  # Autoheal: riavvia i container marcati 'unhealthy' (restart:unless-stopped NON lo fa).
  # Sidecar opzionale (~6MB). Scommenta per attivarlo.
  # autoheal:
  #   image: willfarrell/autoheal:latest
  #   container_name: casavip_autoheal
  #   restart: unless-stopped
  #   environment:
  #     AUTOHEAL_CONTAINER_LABEL: all
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock

networks:
  interna:
    driver: bridge

volumes:
  casavip_data:
