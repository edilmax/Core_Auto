# BookinVIP - stack di PRODUZIONE CON HTTPS (Let's Encrypt + rinnovo automatico).
# Self-contained: usa QUESTO al posto del compose base quando vuoi TLS.
#
# Prima volta (ottiene il certificato):   ./deploy/init-letsencrypt.sh
# Avvii successivi:                        docker compose -f docker-compose.casavip.ssl.yml up -d --build
#
# certbot rinnova da solo ogni 12h; nginx ricarica ogni 6h per prendere il cert nuovo.
name: casavip

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.casavip
    image: casavip-app
    container_name: casavip_app
    restart: unless-stopped
    env_file: .env.casavip
    environment:
      HOST: "0.0.0.0"
      PORTA: "8080"
      DB_CATALOGO: /data/catalogo.db
      DB_INVENTARIO: /data/inventario.db
      DB_REGISTRO_HOST: /data/registro_host.db
      DB_VIRAL: /data/viral.db
      CAMPAGNA_STATO_FILE: /data/campagna_stato.json
      OUTREACH_OPTOUT_FILE: /data/outreach_optout.json
      STATIC_DIR: /app/deploy
    volumes:
      - casavip_data:/data
    networks:
      - interna
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/api/health',timeout=4).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: casavip_nginx
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    networks:
      - interna
    volumes:
      - ./deploy/nginx.casavip.ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro          # certificati (scritti da certbot)
      - ./certbot/www:/var/www/certbot:ro           # webroot sfida ACME
    # ricarica ogni 6h per adottare i certificati appena rinnovati
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # Certbot: emette (init-letsencrypt.sh) e poi RINNOVA da solo ogni 12h.
  certbot:
    image: certbot/certbot
    container_name: casavip_certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'"

  # Backup automatico (snapshot consistente + retention) ogni 6 ore.
  backup:
    image: casavip-app
    container_name: casavip_backup
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do sh deploy/backup_casavip.sh; sleep 21600; done"]
    environment:
      DATA_DIR: /data
      BACKUP_DIR: /data/backup
    volumes:
      - casavip_data:/data
    networks:
      - interna

networks:
  interna:
    driver: bridge

volumes:
  casavip_data:
