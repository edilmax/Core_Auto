<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grazie — Prenotazione confermata · Bookin VIP</title>
<style>
  :root{--blu:#0f4c3a;--blu2:#156b52;--bg:#f4f6fb;--card:#fff;--tx:#1e2b45;--mut:#5e6f8d}
  @media (prefers-color-scheme:dark){:root{--bg:#0f1525;--card:#182034;--tx:#e8edf7;--mut:#9fb0cc}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);padding:1.2rem}
  .card{background:var(--card);border-radius:1.5rem;box-shadow:0 12px 40px rgba(20,40,80,.12);
    padding:2.4rem 2rem;max-width:460px;width:100%;text-align:center}
  .logo{font-weight:800;font-size:1.4rem;background:linear-gradient(135deg,var(--blu),var(--blu2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.2rem}
  .tick{width:76px;height:76px;border-radius:50%;background:#e7f7ec;color:#1a9c4b;display:flex;
    align-items:center;justify-content:center;font-size:2.6rem;margin:0 auto 1rem}
  h1{font-size:1.5rem;margin:.2rem 0 .5rem}
  p{color:var(--mut);line-height:1.6;margin:.4rem 0}
  a.btn{display:inline-block;margin-top:1.4rem;background:var(--blu);color:#fff;text-decoration:none;
    padding:.7rem 1.6rem;border-radius:2rem;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Bookin VIP</div>
    <div class="tick">✓</div>
    <h1 id="h"></h1>
    <p id="p1"></p>
    <p id="p2"></p>
    <a class="btn" href="/" id="btn"></a>
  </div>
<script>
/* Tutte e 8 le lingue, e si rispetta la scelta gia' fatta dall'utente sul sito
   (localStorage 'lang'), non solo la lingua del browser: chi ha navigato in giapponese
   e ha appena pagato deve leggere giapponese proprio qui. */
const T = {
  it:{h:'Grazie! Pagamento ricevuto',p1:'La tua prenotazione è <b>confermata</b>.',p2:'Riceverai a breve un\'email con il voucher e i dettagli del soggiorno.',btn:'Torna alla home',tit:'Grazie — Prenotazione confermata'},
  en:{h:'Thank you! Payment received',p1:'Your booking is <b>confirmed</b>.',p2:'You will receive an email shortly with your voucher and stay details.',btn:'Back to home',tit:'Thank you — Booking confirmed'},
  es:{h:'¡Gracias! Pago recibido',p1:'Tu reserva está <b>confirmada</b>.',p2:'En breve recibirás un correo con el bono y los detalles de la estancia.',btn:'Volver al inicio',tit:'Gracias — Reserva confirmada'},
  fr:{h:'Merci ! Paiement reçu',p1:'Votre réservation est <b>confirmée</b>.',p2:'Vous recevrez sous peu un e-mail avec votre bon et les détails du séjour.',btn:'Retour à l\'accueil',tit:'Merci — Réservation confirmée'},
  de:{h:'Danke! Zahlung erhalten',p1:'Ihre Buchung ist <b>bestätigt</b>.',p2:'Sie erhalten in Kürze eine E-Mail mit Ihrem Gutschein und den Details zum Aufenthalt.',btn:'Zurück zur Startseite',tit:'Danke — Buchung bestätigt'},
  pt:{h:'Obrigado! Pagamento recebido',p1:'A tua reserva está <b>confirmada</b>.',p2:'Vais receber em breve um e-mail com o voucher e os detalhes da estadia.',btn:'Voltar ao início',tit:'Obrigado — Reserva confirmada'},
  ja:{h:'お支払いを受け付けました',p1:'ご予約は<b>確定</b>しました。',p2:'まもなくバウチャーと滞在の詳細をメールでお送りします。',btn:'ホームに戻る',tit:'ありがとうございます — ご予約確定'},
  zh:{h:'感谢您！已收到付款',p1:'您的预订已<b>确认</b>。',p2:'我们将很快通过电子邮件发送凭证和入住详情。',btn:'返回首页',tit:'感谢您 — 预订已确认'}
};
function lingua(){
  const u = new URLSearchParams(location.search).get('lang');
  if (u && T[u]) return u;
  try { const s = localStorage.getItem('lang'); if (s && T[s]) return s; } catch(e){}
  const n = (navigator.language||'en').slice(0,2).toLowerCase();
  return T[n] ? n : 'en';
}
(function(){
  const lg = lingua(), t = T[lg];
  document.documentElement.lang = lg;
  document.title = t.tit + ' \u00b7 Bookin VIP';
  document.getElementById('h').textContent = t.h;
  document.getElementById('p1').innerHTML = t.p1;
  document.getElementById('p2').textContent = t.p2;
  document.getElementById('btn').textContent = t.btn;
})();
</script>
</body>
</html>
