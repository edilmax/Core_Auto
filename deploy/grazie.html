<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Grazie — Prenotazione confermata · BookinVIP</title>
<style>
  :root{--blu:#1e3c72;--blu2:#2a5298;--bg:#f4f6fb;--card:#fff;--tx:#1e2b45;--mut:#5e6f8d}
  @media (prefers-color-scheme:dark){:root{--bg:#0f1525;--card:#182034;--tx:#e8edf7;--mut:#9fb0cc}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);padding:1.2rem}
  .card{background:var(--card);border-radius:1.5rem;box-shadow:0 12px 40px rgba(20,40,80,.12);
    padding:2.4rem 2rem;max-width:460px;width:100%;text-align:center}
  .logo{font-weight:800;font-size:1.4rem;background:linear-gradient(135deg,var(--blu),var(--blu2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.2rem}
  .tick{width:76px;height:76px;border-radius:50%;background:#e7f7ec;color:#1a9c4b;display:flex;
    align-items:center;justify-content:center;font-size:2.6rem;margin:0 auto 1rem}
  h1{font-size:1.5rem;margin:.2rem 0 .5rem}
  p{color:var(--mut);line-height:1.6;margin:.4rem 0}
  a.btn{display:inline-block;margin-top:1.4rem;background:var(--blu);color:#fff;text-decoration:none;
    padding:.7rem 1.6rem;border-radius:2rem;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">BookinVIP</div>
    <div class="tick">✓</div>
    <h1 id="h">Grazie! Pagamento ricevuto</h1>
    <p id="p1">La tua prenotazione è <strong>confermata</strong>.</p>
    <p id="p2">Riceverai a breve un'email con il voucher e i dettagli del soggiorno.</p>
    <a class="btn" href="/" id="btn">Torna alla home</a>
  </div>
<script>
  if((navigator.language||'it').slice(0,2).toLowerCase()==='en'){
    document.documentElement.lang='en';
    document.title='Thank you — Booking confirmed · BookinVIP';
    h.textContent='Thank you! Payment received';
    p1.innerHTML='Your booking is <strong>confirmed</strong>.';
    p2.textContent='You will receive an email shortly with your voucher and stay details.';
    btn.textContent='Back to home';
  }
</script>
</body>
</html>
