# CORE_AUTO - BLOCCO 5.0b/5.1: reverse proxy Nginx (sicurezza + traffico).
# Unico servizio esposto. Inoltra all'app gunicorn sulla rete interna.
worker_processes auto;
events { worker_connections 1024; }

http {
    upstream core_auto_app {
        server app:8000;        # nome servizio docker-compose
    }

    # Limiti anti-abuso (coerenti con MAX_BODY_BYTES dell'app = 1 MiB).
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    sendfile on;
    gzip on;
    gzip_types application/json text/plain;

    # Rate limit di prima linea (lo zonepool e' per-IP; l'app ha il suo).
    limit_req_zone $binary_remote_addr zone=core_rl:10m rate=20r/s;

    server {
        listen 80;
        server_name _;

        # Difesa in profondita' (l'app imposta gli stessi header; qui ridondanza).
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        server_tokens off;     # non rivelare la versione di nginx

        # Healthcheck interno del proxy (non tocca l'app).
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        location / {
            limit_req zone=core_rl burst=40 nodelay;
            proxy_pass http://core_auto_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;     # coerente col TIMEOUT gunicorn
            proxy_send_timeout 30s;
        }
    }

    # SSL/TLS (5.1): in produzione aggiungere un server { listen 443 ssl; ... }
    # con certificati Let's Encrypt e redirect 80->443.
}
