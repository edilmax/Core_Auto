<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pagamento annullato · Bookin VIP</title>
<style>
  :root{--blu:#0f4c3a;--blu2:#156b52;--bg:#f4f6fb;--card:#fff;--tx:#1e2b45;--mut:#5e6f8d}
  @media (prefers-color-scheme:dark){:root{--bg:#0f1525;--card:#182034;--tx:#e8edf7;--mut:#9fb0cc}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);padding:1.2rem}
  .card{background:var(--card);border-radius:1.5rem;box-shadow:0 12px 40px rgba(20,40,80,.12);
    padding:2.4rem 2rem;max-width:460px;width:100%;text-align:center}
  .logo{font-weight:800;font-size:1.4rem;background:linear-gradient(135deg,var(--blu),var(--blu2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.2rem}
  .ico{width:76px;height:76px;border-radius:50%;background:#fdecec;color:#c0392b;display:flex;
    align-items:center;justify-content:center;font-size:2.4rem;margin:0 auto 1rem}
  h1{font-size:1.5rem;margin:.2rem 0 .5rem}
  p{color:var(--mut);line-height:1.6;margin:.4rem 0}
  a.btn{display:inline-block;margin-top:1.4rem;background:var(--blu);color:#fff;text-decoration:none;
    padding:.7rem 1.6rem;border-radius:2rem;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Bookin VIP</div>
    <div class="ico">✕</div>
    <h1 id="h"></h1>
    <p id="p1"></p>
    <p id="p2"></p>
    <a class="btn" href="/" id="btn"></a>
  </div>
<script>
/* Tutte e 8 le lingue, e si rispetta la scelta gia' fatta dall'utente sul sito
   (localStorage 'lang'), non solo la lingua del browser: chi ha navigato in giapponese
   e ha appena pagato deve leggere giapponese proprio qui. */
const T = {
  it:{h:'Pagamento annullato',p1:'<b>Nessun addebito</b> è stato effettuato.',p2:'La stanza resta disponibile: puoi completare la prenotazione quando vuoi.',btn:'Torna alla home',tit:'Pagamento annullato'},
  en:{h:'Payment cancelled',p1:'<b>No charge</b> was made.',p2:'The room is still available: you can complete your booking anytime.',btn:'Back to home',tit:'Payment cancelled'},
  es:{h:'Pago cancelado',p1:'<b>No se ha realizado ningún cargo</b>.',p2:'La habitación sigue disponible: puedes completar la reserva cuando quieras.',btn:'Volver al inicio',tit:'Pago cancelado'},
  fr:{h:'Paiement annulé',p1:'<b>Aucun débit</b> n\'a été effectué.',p2:'La chambre reste disponible : vous pouvez finaliser votre réservation quand vous le souhaitez.',btn:'Retour à l\'accueil',tit:'Paiement annulé'},
  de:{h:'Zahlung abgebrochen',p1:'Es wurde <b>nichts abgebucht</b>.',p2:'Das Zimmer bleibt verfügbar: Sie können die Buchung jederzeit abschließen.',btn:'Zurück zur Startseite',tit:'Zahlung abgebrochen'},
  pt:{h:'Pagamento cancelado',p1:'<b>Não foi efetuada qualquer cobrança</b>.',p2:'O quarto continua disponível: podes concluir a reserva quando quiseres.',btn:'Voltar ao início',tit:'Pagamento cancelado'},
  ja:{h:'お支払いはキャンセルされました',p1:'<b>請求は発生していません</b>。',p2:'お部屋はまだご利用いただけます。いつでもご予約を完了できます。',btn:'ホームに戻る',tit:'お支払いキャンセル'},
  zh:{h:'支付已取消',p1:'<b>未产生任何扣款</b>。',p2:'房间仍然可预订：您可以随时完成预订。',btn:'返回首页',tit:'支付已取消'}
};
function lingua(){
  const u = new URLSearchParams(location.search).get('lang');
  if (u && T[u]) return u;
  try { const s = localStorage.getItem('lang'); if (s && T[s]) return s; } catch(e){}
  const n = (navigator.language||'en').slice(0,2).toLowerCase();
  return T[n] ? n : 'en';
}
(function(){
  const lg = lingua(), t = T[lg];
  document.documentElement.lang = lg;
  document.title = t.tit + ' \u00b7 Bookin VIP';
  document.getElementById('h').textContent = t.h;
  document.getElementById('p1').innerHTML = t.p1;
  document.getElementById('p2').textContent = t.p2;
  document.getElementById('btn').textContent = t.btn;
})();
</script>
</body>
</html>
