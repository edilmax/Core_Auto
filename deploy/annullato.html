<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pagamento annullato · Bookin VIP</title>
<style>
  :root{--blu:#0f4c3a;--blu2:#156b52;--bg:#f4f6fb;--card:#fff;--tx:#1e2b45;--mut:#5e6f8d}
  @media (prefers-color-scheme:dark){:root{--bg:#0f1525;--card:#182034;--tx:#e8edf7;--mut:#9fb0cc}}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);padding:1.2rem}
  .card{background:var(--card);border-radius:1.5rem;box-shadow:0 12px 40px rgba(20,40,80,.12);
    padding:2.4rem 2rem;max-width:460px;width:100%;text-align:center}
  .logo{font-weight:800;font-size:1.4rem;background:linear-gradient(135deg,var(--blu),var(--blu2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.2rem}
  .ico{width:76px;height:76px;border-radius:50%;background:#fdecec;color:#c0392b;display:flex;
    align-items:center;justify-content:center;font-size:2.4rem;margin:0 auto 1rem}
  h1{font-size:1.5rem;margin:.2rem 0 .5rem}
  p{color:var(--mut);line-height:1.6;margin:.4rem 0}
  a.btn{display:inline-block;margin-top:1.4rem;background:var(--blu);color:#fff;text-decoration:none;
    padding:.7rem 1.6rem;border-radius:2rem;font-weight:600}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">Bookin VIP</div>
    <div class="ico">✕</div>
    <h1 id="h">Pagamento annullato</h1>
    <p id="p1"><strong>Nessun addebito</strong> è stato effettuato.</p>
    <p id="p2">La stanza resta disponibile: puoi completare la prenotazione quando vuoi.</p>
    <a class="btn" href="/" id="btn">Torna alla home</a>
  </div>
<script>
  if((navigator.language||'it').slice(0,2).toLowerCase()==='en'){
    document.documentElement.lang='en';
    document.title='Payment cancelled · Bookin VIP';
    h.textContent='Payment cancelled';
    p1.innerHTML='<strong>No charge</strong> was made.';
    p2.textContent='The room is still available: you can complete your booking anytime.';
    btn.textContent='Back to home';
  }
</script>
</body>
</html>
