# CORE_AUTO / Tavola VIP - Reverse proxy Nginx (stack di lancio standalone).
# Unico servizio esposto. Inoltra al servizio 'booking' (gunicorn) sulla rete interna.
worker_processes auto;
events { worker_connections 1024; }

http {
    upstream tavolavip_booking {
        server booking:8000;        # nome servizio in docker-compose.tavolavip.yml
    }

    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    sendfile on;
    gzip on;
    gzip_types application/json text/plain;

    # Rate limit di prima linea (per-IP). Il webhook ha una zona piu' permissiva
    # (Stripe ritenta): non vogliamo scartare notifiche di pagamento legittime.
    limit_req_zone $binary_remote_addr zone=tv_rl:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=tv_wh:10m rate=50r/s;

    server {
        listen 80;
        server_name _;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        server_tokens off;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Webhook PSP: nessuna manomissione del corpo (serve grezzo per la firma).
        location = /api/v1/payments/webhook {
            limit_req zone=tv_wh burst=100 nodelay;
            proxy_pass http://tavolavip_booking;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering on;
        }

        # /metrics: lo scraper Prometheus lo raggiunge su booking:8000 (rete interna).
        # Dall'esterno e' NEGATO (niente info-leak delle metriche).
        location = /metrics {
            deny all;
            return 404;
        }

        location / {
            limit_req zone=tv_rl burst=40 nodelay;
            proxy_pass http://tavolavip_booking;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }

    # SSL/TLS (go-live reale): aggiungere server { listen 443 ssl; } con certificati
    # Let's Encrypt + redirect 80->443 (vedi DEPLOY.md).
}
