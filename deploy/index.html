<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1e3c72">
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/icon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<title>BookinVIP</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:#f4f6fa;color:#1a1e2b;line-height:1.5;padding:1.5rem}
  .container{max-width:1200px;margin:0 auto}
  header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;padding-bottom:1rem;border-bottom:2px solid #dce1ed}
  .logo{font-weight:700;font-size:1.8rem;letter-spacing:-.5px;background:linear-gradient(135deg,#1e3c72,#2a5298);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .logo small{font-weight:400;font-size:.85rem;-webkit-text-fill-color:#5e6f8d;color:#5e6f8d}
  .headright{display:flex;gap:.6rem;align-items:center}
  select#lang{padding:.4rem .7rem;border-radius:.7rem;border:1px solid #dce1ed;font-size:1rem}
  #btnInstall{display:none;background:#1e3c72;color:#fff;border:none;padding:.4rem 1rem;border-radius:2rem;font-weight:600;cursor:pointer}
  .filtri{background:#fff;padding:1.25rem 1.5rem;border-radius:1.5rem;box-shadow:0 4px 12px rgba(0,0,0,.04);margin-bottom:2rem}
  .filtri .riga{display:flex;flex-wrap:wrap;gap:.75rem 1.25rem;align-items:end}
  .filtri label{display:flex;flex-direction:column;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:#4a5b7a;gap:.25rem}
  .filtri input{padding:.5rem .75rem;border-radius:.7rem;border:1px solid #dce1ed;font-size:1rem;min-width:120px}
  .filtri button{background:#1e3c72;color:#fff;border:none;padding:.55rem 1.75rem;border-radius:2rem;font-weight:600;font-size:1rem;cursor:pointer}
  .filtri button:hover{background:#2a5298}
  .chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.9rem}
  .chip{font-size:.8rem;padding:.3rem .8rem;border-radius:1rem;border:1px solid #dce1ed;background:#fff;cursor:pointer;user-select:none}
  .chip.on{background:#1e3c72;color:#fff;border-color:#1e3c72}
  .risultati{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
  .card{background:#fff;border-radius:1.25rem;box-shadow:0 8px 24px rgba(0,0,0,.05);transition:transform .15s;padding:1.25rem;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-4px)}
  .card img.thumb{width:100%;height:170px;object-fit:cover;border-radius:.9rem;margin-bottom:.6rem;background:#eef2f7}
  .card .ph{width:100%;height:170px;border-radius:.9rem;margin-bottom:.6rem;background:linear-gradient(135deg,#eef2f7,#dce1ed);display:flex;align-items:center;justify-content:center;color:#a9b4c9;font-size:2rem}
  .card h3{font-size:1.2rem;margin-bottom:.25rem}
  .gallery{display:flex;gap:.4rem;overflow-x:auto;margin:.5rem 0;padding-bottom:.3rem}
  .gallery img{height:140px;border-radius:.8rem;object-fit:cover;flex:0 0 auto}
  .card .prezzo{font-size:1.5rem;font-weight:700;color:#1e3c72}
  .card .badge{display:inline-block;background:#eef2f7;padding:.15rem .7rem;border-radius:1rem;font-size:.72rem;font-weight:600;color:#2a5298;margin:.15rem .2rem 0 0}
  .card .badge.green{background:#d4edda;color:#155724}.card .badge.red{background:#f8d7da;color:#842029}
  .card .meta{margin-top:.5rem;font-size:.88rem;color:#4a5b7a;flex:1}
  .card button{margin-top:.75rem;background:#2a5298;color:#fff;border:none;padding:.5rem;border-radius:2rem;cursor:pointer;font-weight:600}
  .card button:hover{background:#1e3c72}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:1000;padding:1rem}
  .modal.open{display:flex}
  .modal-content{background:#fff;max-width:560px;width:100%;border-radius:1.5rem;padding:2rem;max-height:90vh;overflow-y:auto;position:relative}
  .close{position:absolute;top:1rem;right:1.3rem;font-size:1.8rem;cursor:pointer;color:#8a9bb5}
  .prezzo-grande{font-size:1.8rem;font-weight:700;color:#1e3c72;margin:.5rem 0}
  .riga-prezzo{display:flex;justify-content:space-between;font-size:.92rem;padding:.15rem 0}
  .riga-prezzo.tot{font-weight:700;border-top:1px solid #dce1ed;margin-top:.4rem;padding-top:.5rem}
  .prenota-btn{margin-top:1rem;width:100%;background:#1e3c72;color:#fff;border:none;padding:.8rem;border-radius:2rem;font-size:1.05rem;font-weight:600;cursor:pointer}
  .loading,.vuoto{text-align:center;padding:3rem;color:#5e6f8d;font-style:italic}
  .msg{padding:.7rem 1rem;border-radius:.7rem;margin-top:.5rem;font-size:.9rem}
  .msg.ok{background:#d4edda;color:#155724}.msg.err{background:#f8d7da;color:#842029}
  @media(max-width:640px){.filtri .riga{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">BookinVIP <small>· alloggi certificati · zero commissioni nascoste</small></div>
    <div class="headright">
      <button id="btnInstall">⬇ App</button>
      <select id="lang">
        <option value="it">🇮🇹 Italiano</option>
        <option value="en">🇬🇧 English</option>
        <option value="es">🇪🇸 Espanol</option>
        <option value="fr">🇫🇷 Francais</option>
        <option value="de">🇩🇪 Deutsch</option>
      </select>
    </div>
  </header>

  <form class="filtri" id="form">
    <div class="riga">
      <label data-ui="citta">Citta<input type="text" id="citta" value="Roma"></label>
      <label data-ui="checkin">Check-in<input type="date" id="checkin" value="2026-09-01"></label>
      <label data-ui="checkout">Check-out<input type="date" id="checkout" value="2026-09-03"></label>
      <label data-ui="ospiti">Ospiti<input type="number" id="ospiti" value="2" min="1" max="20"></label>
      <label>Max €<input type="number" id="prezzomax" placeholder="es. 150" min="0"></label>
      <button type="submit" id="btnCerca">Cerca</button>
    </div>
    <div class="chips" id="chips"></div>
  </form>

  <div id="risultati" class="risultati"><div class="loading">…</div></div>

  <footer style="margin-top:2.5rem;padding-top:1.25rem;border-top:1px solid #dce1ed;text-align:center;color:#5e6f8d;font-size:.9rem">
    <div style="display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap;margin-bottom:.6rem">
      <a href="https://youtube.com/@bookinvip" target="_blank" rel="noopener" style="color:#1e3c72;text-decoration:none">▶ YouTube</a>
      <a href="https://instagram.com/bookinvip" target="_blank" rel="noopener" style="color:#1e3c72;text-decoration:none">📷 Instagram</a>
      <a href="https://tiktok.com/@bookinvip" target="_blank" rel="noopener" style="color:#1e3c72;text-decoration:none">🎵 TikTok</a>
      <a href="https://x.com/bookinvip" target="_blank" rel="noopener" style="color:#1e3c72;text-decoration:none">𝕏 (Twitter)</a>
    </div>
    <div>© BookinVIP · bookinvip.com · zero commissioni nascoste</div>
  </footer>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" id="close">&times;</span>
    <div class="gallery" id="mGallery"></div>
    <h2 id="mTitolo"></h2>
    <div class="prezzo-grande" id="mPrezzo"></div>
    <div id="mBadge"></div>
    <div id="mRating" style="margin:.3rem 0;font-weight:600;color:#8a6d0b"></div>
    <p id="mDescr" style="color:#4a5b7a;margin:.5rem 0"></p>
    <div id="mRecensioni"></div>
    <div id="mQuote"></div>
    <button class="prenota-btn" id="btnPrenota">Prenota</button>
    <div id="mMsg"></div>
  </div>
</div>

<script>
const API = location.origin.startsWith('http') ? '' : 'http://127.0.0.1:8080';
const SERVIZI = ['wifi','piscina','parcheggio','aria_condizionata','animali_ammessi','colazione'];
let I18N = {ui:{},servizi:{}}, LANG = 'it', QUOTE = null, attivi = new Set();

function t(k){ return (I18N.ui && I18N.ui[k]) || k; }
function srv(c){ return (I18N.servizi && I18N.servizi[c]) || c; }
function eur(c){ return '€ ' + ((c||0)/100).toFixed(2); }
async function api(path, opts){ const r = await fetch(API+path, opts); return r.json(); }

function renderChips(){
  document.getElementById('chips').innerHTML = SERVIZI.map(c=>
    `<span class="chip ${attivi.has(c)?'on':''}" data-c="${c}">${srv(c)}</span>`).join('');
  document.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{
    const c=ch.dataset.c; attivi.has(c)?attivi.delete(c):attivi.add(c); renderChips(); cerca();
  });
}

async function caricaI18N(lang){
  try{ I18N = await api('/api/i18n?lang='+lang); }catch(e){ I18N={ui:{},servizi:{}}; }
  document.querySelectorAll('[data-ui]').forEach(el=>{ el.childNodes[0].nodeValue = t(el.getAttribute('data-ui')); });
  document.getElementById('btnCerca').textContent = '🔍 '+t('cerca');
  document.getElementById('btnPrenota').textContent = '📅 '+t('prenota');
  renderChips();
}

function stelle(rie){
  if(!rie || !rie.conteggio) return '';
  const m=(rie.media_centesimi/100).toFixed(1);
  return `<span style="color:#e0a800">★ ${m}</span> <span style="color:#5e6f8d;font-size:.8rem">(${rie.conteggio})</span>`;
}
function cardHtml(a){
  const serv = (a.servizi_label||a.servizi||[]).slice(0,4).map(s=>`<span class="badge">${s}</span>`).join('');
  let disp=''; if(a.disponibile===true) disp=`<span class="badge green">✓</span>`;
  else if(a.disponibile===false) disp=`<span class="badge red">${t('non_disp')}</span>`;
  const foto = a.thumbnail ? `<img class="thumb" src="${a.thumbnail}" alt="${a.titolo}" loading="lazy" onerror="this.outerHTML='<div class=ph>🏠</div>'">` : '<div class="ph">🏠</div>';
  return `<div class="card">${foto}<h3>${a.titolo}</h3>
    <div class="prezzo">${eur(a.prezzo_notte_cents)} <span style="font-size:.85rem;font-weight:400;color:#5e6f8d">/ ${t('notte')}</span></div>
    <div style="margin:.2rem 0">${stelle(a.recensioni)}</div>
    <div style="margin:.3rem 0">${serv} ${disp}</div>
    <div class="meta">📍 ${a.citta}${a.paese?', '+a.paese:''}</div>
    <button data-slug="${a.slug}">${t('dettaglio')}</button></div>`;
}

async function cerca(){
  const ris = document.getElementById('risultati');
  ris.innerHTML = `<div class="loading">${t('caricamento')}</div>`;
  const params = {citta:document.getElementById('citta').value.trim(),
    check_in:document.getElementById('checkin').value, check_out:document.getElementById('checkout').value, lang:LANG};
  const pmax = parseInt(document.getElementById('prezzomax').value);
  if(pmax>0) params.prezzo_max_cents = pmax*100;
  if(attivi.size) params.servizi = [...attivi].join(',');
  try{
    const data = await api('/api/catalogo?'+new URLSearchParams(params).toString());
    if(data.risultati && data.risultati.length){
      ris.innerHTML = data.risultati.map(cardHtml).join('');
      ris.querySelectorAll('button[data-slug]').forEach(b=>b.onclick=()=>apri(b.dataset.slug));
    } else { ris.innerHTML = `<div class="vuoto">${t('nessun_risultato')}</div>`; }
  }catch(e){ ris.innerHTML = `<div class="msg err">${t('errore')}: ${e.message}</div>`; }
}

async function apri(slug){
  try{
    const a = await api('/api/catalogo/'+encodeURIComponent(slug)+'?lang='+LANG);
    if(a.errore){ alert(t('errore')); return; }
    const imgs = (a.immagini||[]).map(i=>i.url).filter(Boolean);
    document.getElementById('mGallery').innerHTML = imgs.length
      ? imgs.map(u=>`<img src="${u}" alt="" loading="lazy" onerror="this.style.display='none'">`).join('')
      : '';
    document.getElementById('mTitolo').textContent = a.titolo;
    document.getElementById('mPrezzo').textContent = eur(a.prezzo_notte_cents)+' / '+t('notte');
    document.getElementById('mBadge').innerHTML = (a.servizi_label||a.servizi||[]).map(s=>`<span class="badge">${s}</span>`).join('');
    document.getElementById('mRating').innerHTML = stelle(a.recensioni);
    document.getElementById('mDescr').textContent = a.descrizione||'';
    document.getElementById('mMsg').innerHTML='';
    // recensioni verificate (solo chi ha pagato)
    const rec = document.getElementById('mRecensioni'); rec.innerHTML='';
    try{
      const rr = await api('/api/recensioni/'+encodeURIComponent(slug));
      if(rr.recensioni && rr.recensioni.length){
        rec.innerHTML = '<div style="margin:.5rem 0;font-size:.9rem">'+
          rr.recensioni.slice(0,4).map(x=>{
            const txt=(x.testo&&x.testo.text)?x.testo.text:'';
            return `<div style="border-top:1px solid #eef2f7;padding:.4rem 0">★ ${x.voto} <span style="color:#155724;font-size:.72rem">✓ verificata</span><br><span style="color:#4a5b7a">${txt.replace(/[<>]/g,'')}</span></div>`;
          }).join('')+'</div>';
      }
    }catch(e){}
    const q = await api('/api/concierge/quote', {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({alloggio_id:slug, check_in:document.getElementById('checkin').value,
        check_out:document.getElementById('checkout').value, party:parseInt(document.getElementById('ospiti').value)||1})});
    const mq = document.getElementById('mQuote');
    if(q.quote_token){
      QUOTE = q.quote_token;
      mq.innerHTML = `<div class="riga-prezzo"><span>${t('netto')}</span><span>${eur(q.prezzo_netto_cents)}</span></div>
        <div class="riga-prezzo"><span>${t('commissione')}</span><span>${eur(q.commissione_cents)}</span></div>
        <div class="riga-prezzo tot"><span>${t('totale')} (${q.notti||''} x ${t('notte')})</span><span>${eur(q.prezzo_guest_cents)}</span></div>`;
      document.getElementById('btnPrenota').style.display='';
    } else { QUOTE=null; mq.innerHTML=`<div class="msg err">${t('non_disp')}</div>`; document.getElementById('btnPrenota').style.display='none'; }
    document.getElementById('modal').classList.add('open');
  }catch(e){ alert(t('errore')+': '+e.message); }
}

async function prenota(){
  if(!QUOTE) return;
  const email = prompt(t('email')+':'); if(!email) return;
  const msg = document.getElementById('mMsg');
  try{
    const r = await api('/api/concierge/book', {method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({quote_token:QUOTE, email:email})});
    if(r.stato==='confermata'){
      if(r.payment_url){ window.location.href = r.payment_url; return; }   // redirect al checkout Stripe
      const voucher = r.voucher_token ? ` · <a href="/voucher/${encodeURIComponent(r.voucher_token)}?lang=${LANG}" target="_blank" style="color:#155724;font-weight:700">📄 Voucher</a>` : '';
      msg.innerHTML=`<div class="msg ok">✅ ${t('conferma')} (${r.riferimento||''})${voucher}</div>`; document.getElementById('btnPrenota').style.display='none';
    }
    else { msg.innerHTML=`<div class="msg err">❌ ${r.motivo||r.errore||t('errore')}</div>`; }
  }catch(e){ msg.innerHTML=`<div class="msg err">${t('errore')}: ${e.message}</div>`; }
}

document.getElementById('form').onsubmit = e=>{ e.preventDefault(); cerca(); };
document.getElementById('close').onclick = ()=>document.getElementById('modal').classList.remove('open');
document.getElementById('modal').onclick = e=>{ if(e.target.id==='modal') e.target.classList.remove('open'); };
document.getElementById('btnPrenota').onclick = prenota;
document.getElementById('lang').onchange = async e=>{ LANG=e.target.value; document.documentElement.lang=LANG; await caricaI18N(LANG); cerca(); };

// PWA: installazione + service worker
let deferred=null;
window.addEventListener('beforeinstallprompt', e=>{ e.preventDefault(); deferred=e; document.getElementById('btnInstall').style.display='inline-block'; });
document.getElementById('btnInstall').onclick = async ()=>{ if(!deferred) return; deferred.prompt(); await deferred.userChoice; deferred=null; document.getElementById('btnInstall').style.display='none'; };
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}); }

(async()=>{ await caricaI18N(LANG); cerca(); })();
</script>
</body>
</html>
