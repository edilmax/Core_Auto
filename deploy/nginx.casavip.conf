# Casa VIP - reverse proxy Nginx. L'app (fase83) serve sia API che frontend statico;
# nginx aggiunge TLS, rate-limit, header di sicurezza ed e' l'unico punto esposto.

upstream casavip_app {
    server app:8080;
}

# rate-limit di prima linea (anti-abuso)
limit_req_zone $binary_remote_addr zone=casavip:10m rate=20r/s;

server {
    listen 80;
    server_name _;

    server_tokens off;
    client_max_body_size 1m;

    # security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # IP reale dietro un proxy/CDN fidato (es. Cloudflare). Scommenta e metti le reti:
    # set_real_ip_from 173.245.48.0/20;
    # real_ip_header CF-Connecting-IP;

    # hardening base (WAF-lite): blocca traversal, null-byte, dotfile, encoded slash
    location ~* (\.\./|%2e%2e|%00|\\x00) { return 403; }
    location ~ /\.(?!well-known) { deny all; }   # niente .env/.git/dotfile (salvo acme)

    # endpoint di salute del proxy
    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

    location / {
        limit_req zone=casavip burst=40 nodelay;
        proxy_pass http://casavip_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}

