# CORE_AUTO / Tavola VIP - Reverse proxy Nginx HTTPS (go-live pubblico, BLOCCO 5.1).
# Attivazione: sostituisci 'tavolavip.example' col TUO dominio e procura i
# certificati Let's Encrypt (certbot). Monta /etc/letsencrypt nel container nginx
# (vedi docker-compose.tavolavip.ssl.yml e DEPLOY.md). HTTP 80 -> redirect 443.
worker_processes auto;
events { worker_connections 1024; }

http {
    upstream tavolavip_booking {
        server booking:8000;
    }

    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    sendfile on;
    gzip on;
    gzip_types application/json text/plain;

    limit_req_zone $binary_remote_addr zone=tv_rl:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=tv_wh:10m rate=50r/s;

    # --- HTTP: solo challenge ACME (rinnovo cert) + redirect a HTTPS ---
    server {
        listen 80;
        server_name tavolavip.example;       # <-- IL TUO DOMINIO

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;            # webroot per il rinnovo certbot
        }
        location = /healthz {                 # healthcheck interno (no redirect)
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS: il servizio vero ---
    server {
        listen 443 ssl;
        http2 on;
        server_name tavolavip.example;        # <-- IL TUO DOMINIO

        ssl_certificate     /etc/letsencrypt/live/tavolavip.example/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tavolavip.example/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS + hardening (HTTPS reale -> attiva la difesa completa).
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        server_tokens off;

        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Webhook PSP: corpo grezzo intatto per la verifica della firma.
        location = /api/v1/payments/webhook {
            limit_req zone=tv_wh burst=100 nodelay;
            proxy_pass http://tavolavip_booking;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_request_buffering on;
        }

        location / {
            limit_req zone=tv_rl burst=40 nodelay;
            proxy_pass http://tavolavip_booking;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }
}
