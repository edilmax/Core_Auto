<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 84" role="img" aria-label="Bookin VIP">
  <!-- Wordmark distintivo "Bookin VIP" (staccato): verde profondo + oro, corona sul VIP.
       Brand VOLUTAMENTE diverso da qualunque OTA (niente blu Booking, niente B in scatola). -->
  <defs>
    <linearGradient id="oro" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6c15c"/><stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <g transform="translate(236,6)">
    <path d="M4 16 L11 4 L20 13 L29 2 L38 13 L47 4 L54 16 Z" fill="url(#oro)"/>
    <rect x="4" y="17" width="50" height="4.5" rx="2" fill="url(#oro)"/>
  </g>
  <text x="8" y="60" font-family="Georgia, 'Times New Roman', serif" font-size="42"
        font-weight="700" fill="#0f4c3a" letter-spacing="0.5">Bookin</text>
  <text x="232" y="60" font-family="Georgia, 'Times New Roman', serif" font-size="42"
        font-weight="800" fill="url(#oro)" letter-spacing="3">VIP</text>
  <rect x="8" y="70" width="326" height="3" rx="1.5" fill="#0f4c3a" opacity=".85"/>
</svg>
