# ─────────────────────────────────────────────────────────────────────────────
# CONFIG per l'NGINX DI SISTEMA del VPS (host) — NON quello del container Docker.
# Serve quando sul VPS gira un nginx host (/etc/nginx) davanti all'app.
#
# APPLICAZIONE:
#   sudo cp deploy/nginx.host-vps.conf /etc/nginx/sites-available/bookinvip
#   sudo ln -sf /etc/nginx/sites-available/bookinvip /etc/nginx/sites-enabled/bookinvip
#   sudo rm -f /etc/nginx/sites-enabled/default         # togli il default che intercetta
#   sudo nginx -t && sudo systemctl reload nginx
#
# CAUSA DEL BUG "rotta_non_trovata": un  proxy_pass http://127.0.0.1:8080/;  con lo SLASH
# FINALE taglia il prefisso -> l'app riceve "/domanda" invece di "/api/domanda" -> 404.
# QUI: UN SOLO  location /  con proxy_pass SENZA slash finale -> il path arriva INTEGRO.
# (l'app serve da sola sia le pagine statiche sia le rotte /api, quindi basta un proxy unico.)
#
# PREREQUISITO: l'app deve essere raggiungibile su 127.0.0.1:8080 dall'host. Se ricevi 502,
# pubblica la porta nel compose -> app:  ports: ["127.0.0.1:8080:8080"]  e NON avviare anche
# il container nginx (conflitto sulla porta 80: usa UNO solo dei due nginx).
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name bookinvip.com www.bookinvip.com _;

    client_max_body_size 2m;

    # tutto (pagine + /api/*) va all'app: NIENTE slash finale dopo la porta -> path preservato
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
