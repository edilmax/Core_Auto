# BookinVIP - reverse proxy Nginx CON TLS (Let's Encrypt).
# Self-contained (sostituisce default.conf). Cambia "bookinvip.com" se usi un altro dominio
# (in 3 punti qui + in deploy/init-letsencrypt.sh). Bootstrap: ./deploy/init-letsencrypt.sh

upstream casavip_app {
    server app:8080;
}

# rate-limit di prima linea (anti-abuso)
limit_req_zone $binary_remote_addr zone=casavip:10m rate=20r/s;

# ── HTTP :80 → serve la sfida ACME, tutto il resto va a HTTPS ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bookinvip.com www.bookinvip.com;
    server_tokens off;

    # rinnovo/emissione certificati (certbot scrive qui via volume)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # tutto il resto → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bookinvip.com www.bookinvip.com;

    ssl_certificate     /etc/letsencrypt/live/bookinvip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookinvip.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;
    client_max_body_size 1m;

    # security headers (HSTS: forza HTTPS per 1 anno — attiva SOLO quando il cert è OK)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    # CSP — difesa a STRATI contro l'XSS (nel collaudo 2026-07-15 ne sono stati trovati 4).
    # Ogni direttiva e' stata verificata contro l'uso REALE del sito, non copiata da una guida:
    #  - script/style 'unsafe-inline' + unpkg: il sito ha UN <script> inline per pagina e carica
    #    Leaflet (CSS+JS) da unpkg in lazy. ONESTA': con 'unsafe-inline' la CSP NON ferma un
    #    handler inline (onerror=...); ferma pero' l'ESCALATION vera: <script src="//cattivo">.
    #  - img-src https: (permissivo di proposito): le foto degli annunci in prod sono ESTERNE
    #    (image.pollinations.ai) -> con 'self' sparirebbero TUTTE. Stringere quando le foto
    #    saranno ri-ospitate su /uploads/. blob:/data: servono ai download (CSV, PDF contratto).
    #  - connect-src 'self': verificato che NESSUNA fetch/XHR punta fuori -> blocca l'exfiltrazione
    #    dei dati da parte di un eventuale XSS residuo. E' il pezzo che vale di piu'.
    #  - object-src/frame-ancestors 'none': verificato che non ci sono iframe/embed/object.
    #  - niente 'unsafe-eval': verificato che non si usano eval/new Function.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    # IP reale dietro CDN fidato (es. Cloudflare). Scommenta e metti le reti:
    # set_real_ip_from 173.245.48.0/20;
    # real_ip_header CF-Connecting-IP;

    # hardening base (WAF-lite): traversal, null-byte, dotfile (salvo acme)
    location ~* (\.\./|%2e%2e|%00|\\x00) { return 403; }
    location ~ /\.(?!well-known) { deny all; }

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

    # Upload foto host: un'immagine fino a 5MB diventa ~7MB in base64 (JSON) → tetto piu' alto
    # SOLO qui (il resto del sito resta a 1m come anti-abuso). Auth host obbligatoria a valle.
    location = /api/host/upload_foto {
        limit_req zone=casavip burst=10 nodelay;
        client_max_body_size 8m;
        proxy_pass http://casavip_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        limit_req zone=casavip burst=40 nodelay;
        proxy_pass http://casavip_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
