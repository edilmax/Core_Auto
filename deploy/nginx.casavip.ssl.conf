# BookinVIP - reverse proxy Nginx CON TLS (Let's Encrypt).
# Self-contained (sostituisce default.conf). Cambia "bookinvip.com" se usi un altro dominio
# (in 3 punti qui + in deploy/init-letsencrypt.sh). Bootstrap: ./deploy/init-letsencrypt.sh

upstream casavip_app {
    server app:8080;
}

# rate-limit di prima linea (anti-abuso)
limit_req_zone $binary_remote_addr zone=casavip:10m rate=20r/s;

# ── HTTP :80 → serve la sfida ACME, tutto il resto va a HTTPS ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name bookinvip.com www.bookinvip.com;
    server_tokens off;

    # rinnovo/emissione certificati (certbot scrive qui via volume)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # tutto il resto → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS :443 ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bookinvip.com www.bookinvip.com;

    ssl_certificate     /etc/letsencrypt/live/bookinvip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookinvip.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;
    client_max_body_size 1m;

    # security headers (HSTS: forza HTTPS per 1 anno — attiva SOLO quando il cert è OK)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # IP reale dietro CDN fidato (es. Cloudflare). Scommenta e metti le reti:
    # set_real_ip_from 173.245.48.0/20;
    # real_ip_header CF-Connecting-IP;

    # hardening base (WAF-lite): traversal, null-byte, dotfile (salvo acme)
    location ~* (\.\./|%2e%2e|%00|\\x00) { return 403; }
    location ~ /\.(?!well-known) { deny all; }

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }

    location / {
        limit_req zone=casavip burst=40 nodelay;
        proxy_pass http://casavip_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
