<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>Termini di servizio · Bookin VIP</title>
<link rel="icon" href="/icon.svg"><style>body{font-family:system-ui,'Segoe UI',sans-serif;
background:#f4f6fa;color:#1a1e2b;line-height:1.65;padding:1.5rem;max-width:820px;margin:0 auto}
h1,h2,h3{color:#0f4c3a}a{color:#156b52}
.top{display:flex;justify-content:space-between;align-items:center;gap:1rem;border-bottom:2px solid #d7e8e0;
padding-bottom:.8rem;margin-bottom:1.2rem;flex-wrap:wrap}.card{background:#fff;border-radius:1.2rem;
padding:2rem;box-shadow:0 6px 18px rgba(0,0,0,.05)}
select{font:inherit;padding:.35rem .6rem;border:1px solid #cfe0d8;border-radius:.6rem;background:#fff}
#testo{white-space:pre-wrap}
#testo h2{font-size:1.05rem;margin:1.4rem 0 .3rem}
.meta{margin-top:1.6rem;padding-top:1rem;border-top:1px solid #e4ece8;font-size:.85rem;color:#5a6b7c}
.fede{background:#eef6f2;border:1px solid #cfe4da;border-radius:.7rem;padding:.7rem .9rem;margin:.9rem 0;font-size:.9rem}
code{background:#f1f4f8;padding:.1rem .35rem;border-radius:.3rem;font-size:.82rem;word-break:break-all}</style></head>
<body>
<div class="top">
  <a href="/"><img src="/logo.svg" alt="Bookin VIP" style="height:34px"></a>
  <span style="display:flex;gap:.7rem;align-items:center">
    <select id="lang" aria-label="lingua"></select>
    <a href="/" id="torna"></a>
  </span>
</div>
<div class="card">
  <h1 id="titolo"></h1>
  <div class="fede" id="fede"></div>
  <div id="testo"></div>
  <div class="meta" id="meta"></div>
</div>
<script>
/* La pagina NON contiene testo italiano fisso: il documento arriva da
   /api/legale/documento nella lingua scelta, e la cornice si traduce qui sotto.
   E' l'anello che mancava: il modulo fase185 era completo ma non collegato, e il sito
   continuava a mostrare la vecchia pagina statica, leggibile solo in italiano. */
const DOC = 'termini';
const LINGUE = [['it','\u{1F1EE}\u{1F1F9} Italiano'],['en','\u{1F1EC}\u{1F1E7} English'],
                ['es','\u{1F1EA}\u{1F1F8} Español'],['fr','\u{1F1EB}\u{1F1F7} Français'],
                ['de','\u{1F1E9}\u{1F1EA} Deutsch'],['pt','\u{1F1F5}\u{1F1F9} Português'],
                ['ja','\u{1F1EF}\u{1F1F5} 日本語'],['zh','\u{1F1E8}\u{1F1F3} 中文']];
const CORNICE = {
  it:{torna:'← Torna al sito', ver:'Versione', impronta:'Impronta del testo (SHA-256)',
      fede:'Questo documento è fornito in 8 lingue. In caso di divergenza fa fede la versione ITALIANA.',
      err:'Documento non disponibile in questo momento. Riprova fra poco.'},
  en:{torna:'← Back to the site', ver:'Version', impronta:'Text fingerprint (SHA-256)',
      fede:'This document is provided in 8 languages. In case of divergence, the ITALIAN version prevails.',
      err:'Document unavailable right now. Please try again shortly.'},
  es:{torna:'← Volver al sitio', ver:'Versión', impronta:'Huella del texto (SHA-256)',
      fede:'Este documento se facilita en 8 idiomas. En caso de divergencia prevalece la versión ITALIANA.',
      err:'Documento no disponible en este momento. Inténtalo de nuevo en unos minutos.'},
  fr:{torna:'← Retour au site', ver:'Version', impronta:'Empreinte du texte (SHA-256)',
      fede:'Ce document est fourni en 8 langues. En cas de divergence, la version ITALIENNE fait foi.',
      err:'Document indisponible pour le moment. Réessayez dans quelques instants.'},
  de:{torna:'← Zurück zur Website', ver:'Version', impronta:'Textprüfsumme (SHA-256)',
      fede:'Dieses Dokument wird in 8 Sprachen bereitgestellt. Bei Abweichungen ist die ITALIENISCHE Fassung maßgeblich.',
      err:'Dokument derzeit nicht verfügbar. Bitte versuchen Sie es in Kürze erneut.'},
  pt:{torna:'← Voltar ao site', ver:'Versão', impronta:'Impressão do texto (SHA-256)',
      fede:'Este documento é disponibilizado em 8 línguas. Em caso de divergência prevalece a versão ITALIANA.',
      err:'Documento indisponível neste momento. Tenta novamente dentro de instantes.'},
  ja:{torna:'← サイトに戻る', ver:'バージョン',
      impronta:'本文のハッシュ値 (SHA-256)',
      fede:'本書は8言語で提供されます。解釈に相違がある場合はイタリア語版が優先します。',
      err:'ただいま書類を表示できません。しばらくしてからお試しください。'},
  zh:{torna:'← 返回网站', ver:'版本', impronta:'文本指纹 (SHA-256)',
      fede:'本文件提供 8 种语言版本。若各版本之间存在差异，以意大利语版本为准。',
      err:'文件暂时无法显示，请稍后再试。'}
};
function scegliLingua(){
  const u = new URLSearchParams(location.search).get('lang');
  if (u && CORNICE[u]) return u;
  try { const s = localStorage.getItem('lang'); if (s && CORNICE[s]) return s; } catch(e){}
  const n = (navigator.language||'en').slice(0,2).toLowerCase();
  return CORNICE[n] ? n : 'en';
}
function esc(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function comeHtml(testo){
  /* i titoli numerati ("3. OBBLIGHI DELL'HOST") diventano intestazioni vere: si legge
     meglio e chi usa un lettore di schermo puo' orientarsi. Tutto passa da esc(): il
     testo del documento non puo' iniettare marcatura. */
  return esc(testo).split('\n').map(function(r){
    return (/^\s*\d+(-BIS)?[.)]\s+\S/i.test(r) && r === r.toUpperCase())
      ? '<h2>' + r.trim() + '</h2>' : r;
  }).join('\n');
}
async function carica(lang){
  document.documentElement.lang = lang;
  const c = CORNICE[lang];
  document.getElementById('torna').textContent = c.torna;
  document.getElementById('fede').textContent = c.fede;
  try { localStorage.setItem('lang', lang); } catch(e){}
  try {
    const r = await fetch('/api/legale/documento?doc=' + DOC + '&lang=' + lang);
    const d = await r.json();
    if (!d || !d.testo) throw new Error('vuoto');
    const righe = d.testo.split('\n');
    document.getElementById('titolo').textContent = righe[0];
    document.title = righe[0] + ' · Bookin VIP';
    document.getElementById('testo').innerHTML = comeHtml(righe.slice(1).join('\n').trim());
    document.getElementById('meta').innerHTML =
      esc(c.ver) + ' <b>' + esc(d.versione) + '</b><br>' +
      esc(c.impronta) + ': <code>' + esc(d.doc_sha256) + '</code>';
  } catch(e) {
    document.getElementById('testo').textContent = c.err;
    console.warn('documento legale', e);
  }
}
const sel = document.getElementById('lang');
LINGUE.forEach(function(v){
  const o = document.createElement('option'); o.value = v[0]; o.textContent = v[1];
  sel.appendChild(o);
});
sel.value = scegliLingua();
sel.addEventListener('change', function(){ carica(sel.value); });
carica(sel.value);
</script>
</body></html>
