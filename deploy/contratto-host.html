<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contratto Host — BookinVIP</title>
<style>
  :root{--blu:#1e3c72;--blu2:#2a5298;--bg:#f4f6fb;--card:#fff;--tx:#1e2b45;--mut:#5e6f8d;--bd:#dce1ed}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);line-height:1.6}
  .wrap{max-width:820px;margin:0 auto;padding:1.5rem 1.1rem 4rem}
  header{display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
  .logo{font-weight:800;font-size:1.5rem;background:linear-gradient(135deg,var(--blu),var(--blu2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .langs button{border:1px solid var(--bd);background:#fff;color:var(--blu);border-radius:2rem;padding:.35rem .9rem;font-weight:600;cursor:pointer;margin-left:.4rem}
  .langs button.on{background:var(--blu);color:#fff;border-color:var(--blu)}
  .meta{background:#eef3ff;border:1px solid #d6e0f8;border-radius:1rem;padding:.8rem 1rem;font-size:.82rem;color:var(--mut);margin-bottom:1rem;word-break:break-all}
  .meta b{color:var(--blu)}
  .card{background:var(--card);border-radius:1.25rem;box-shadow:0 6px 20px rgba(20,40,80,.06);padding:1.4rem 1.4rem;border:1px solid var(--bd)}
  pre.testo{white-space:pre-wrap;word-wrap:break-word;font-family:inherit;font-size:.95rem;margin:0}
  a.back{color:var(--blu);text-decoration:none;font-weight:600;font-size:.9rem}
  .tools{margin:.9rem 0 0;display:flex;gap:.6rem;flex-wrap:wrap}
  .tools button{border:none;background:var(--blu);color:#fff;border-radius:2rem;padding:.5rem 1.1rem;font-weight:600;cursor:pointer}
  @media print{.langs,.tools,.back{display:none}.card{box-shadow:none;border:none}body{background:#fff}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">BookinVIP</div>
    <div class="langs">
      <button data-l="it" class="on">Italiano</button>
      <button data-l="en">English</button>
    </div>
  </header>
  <a class="back" href="/diventa-host.html">&larr; <span id="t_back">Torna</span></a>
  <div class="meta" id="meta">…</div>
  <div class="card"><pre class="testo" id="testo">…</pre></div>
  <div class="tools">
    <button onclick="window.print()" id="t_print">🖨️ Stampa / Salva PDF</button>
    <a class="back" href="/host.html" style="align-self:center">Pannello host &rarr;</a>
  </div>
</div>
<script>
const API = location.origin.startsWith('http') ? '' : 'http://127.0.0.1:8080';
const L = {it:{back:'Torna',print:'🖨️ Stampa / Salva PDF'},en:{back:'Back',print:'🖨️ Print / Save PDF'}};
function pickLang(){ const u=new URLSearchParams(location.search).get('lang');
  const b=(navigator.language||'it').slice(0,2).toLowerCase();
  return (u==='en'||u==='it')?u:(b==='en'?'en':'it'); }
let lang = pickLang();
async function carica(l){
  lang=l;
  document.querySelectorAll('.langs button').forEach(b=>b.classList.toggle('on',b.dataset.l===l));
  document.documentElement.lang=l;
  document.getElementById('t_back').textContent=L[l].back;
  document.getElementById('t_print').textContent=L[l].print;
  try{
    const r = await fetch(API+'/api/legale/contratto-host?lang='+l);
    const d = await r.json();
    document.getElementById('testo').textContent = d.testo || '(testo non disponibile)';
    const dl = l==='en'
      ? 'Version <b>'+d.versione+'</b> · binding text: Italian · document fingerprint (SHA-256): <b>'+d.doc_sha256+'</b>'
      : 'Versione <b>'+d.versione+'</b> · testo che fa fede: italiano · impronta del documento (SHA-256): <b>'+d.doc_sha256+'</b>';
    document.getElementById('meta').innerHTML = dl;
  }catch(e){ document.getElementById('testo').textContent='Errore di caricamento.'; }
}
document.querySelectorAll('.langs button').forEach(b=>b.onclick=()=>carica(b.dataset.l));
carica(lang);
</script>
</body>
</html>
