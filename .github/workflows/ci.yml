# CORE_AUTO / Tavola VIP - CI: l'intera suite gira ad ogni push e PR.
name: CI

on:
  push:
  pull_request:

# Least-privilege: il workflow legge soltanto il codice.
permissions:
  contents: read

# Annulla le run superate sullo stesso ref (risparmia minuti CI).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false          # esegui entrambe le versioni anche se una fallisce
      matrix:
        python-version: ["3.9", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip            # cache delle dipendenze tra le run
      - name: Installa dipendenze
        run: pip install -r requirements.txt
      - name: Suite di test (gate di regressione)
        run: python -m unittest discover -p "test_*.py"
