name: BookinVIP CI

# Gira ad ogni push/PR su master. In piu': la scansione OWASP ZAP del sito live gira
# SOLO su schedule settimanale o avvio manuale (non ad ogni commit).
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 3 * * 1'      # ogni lunedi' 03:00 UTC -> scansione ZAP del sito live
  workflow_dispatch: {}       # avvio manuale (utile per lanciare la ZAP a richiesta)

# Token di CI a PRIVILEGI MINIMI: i job leggono il codice, non scrivono nulla.
permissions:
  contents: read

jobs:
  # Feedback VELOCE: i test critici sui soldi + Paga in Struttura (pochi minuti).
  money-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - name: Dipendenze di test
        run: pip install hypothesis
      - name: Test money-path + Paga in Struttura
        run: |
          python -m unittest \
            test_paga_struttura test_paga_struttura_p0 test_paga_struttura_e2e \
            test_paga_struttura_cablaggio test_paga_struttura_avanzato \
            test_fase85_pagamenti_stripe test_fase98_policy_commissione \
            test_conservazione_denaro test_cancellazione_money \
            test_fase189_price_alerts test_fase190_rate_parity \
            test_property_soldi

  # Suite INTERA (piu' lunga): il quadro completo. Installa le dipendenze di test che
  # alcuni test importano (flask/yaml/hypothesis) cosi' girano DAVVERO (non si saltano).
  full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - name: Dipendenze di test
        run: pip install -r requirements.txt hypothesis pyyaml
      - name: Suite completa
        run: python -m unittest discover -s . -p "test_*.py"

  # Guardia mutazione: prova che i test dei soldi non sono ciechi.
  mutazione:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - name: Mutazione (i test si accorgono dei guasti?)
        run: python collaudi/mutazione_prodotto.py

  # Qualita' statica + dipendenze (Ubuntu): ruff, mypy sui soldi, pip-audit.
  qualita:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - run: pip install ruff mypy pip-audit bandit
      - name: Ruff (bug potenziali)
        run: ruff check fase*.py main_casavip.py --select F,E7 || true
      - name: Mypy sui motori-soldi
        run: mypy fase188_paga_struttura.py fase98_policy_commissione.py fase111_cancellazione.py --ignore-missing-imports || true
      - name: pip-audit (dipendenze)
        run: pip-audit || true
      # Bandit (security scanner). GATE VERO sul grave: un finding HIGH fa fallire la build.
      # Escluso ./collaudi (strumenti di test) e ./_archivio (storia). app.py e' Flask legacy
      # MORTO (produzione = fase83 stdlib) -> le sue voci non contano. Oggi: 0 HIGH.
      - name: Bandit (sicurezza — blocca sul grave)
        run: bandit -r . -x ./collaudi,./_archivio,./app.py --severity-level high --confidence-level high

  # ===== STRUMENTI ESTERNI: girano SOLO su Linux (Java/clang assenti su Windows) =====

  # W3C: validatore HTML5 ufficiale (Nu di W3C, via Java) su tutte le pagine servite.
  # HTML in STRICT (blocca sugli errori HTML veri: al primo giro erano img src="" e <div>
  # dentro <label>, ora corretti -> 0 errori HTML). CSS in REPORT-ONLY: il motore CSS del
  # validatore e' datato e segnala a torto CSS validi e moderni (inset, text-wrap) -> non blocca.
  w3c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.9' }
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Installa html5validator (usa il Nu di W3C)
        run: pip install html5validator
      # REPORT-ONLY (|| true): il Nu di W3C valida ANCHE il CSS inline nelle pagine e il suo
      # motore CSS e' datato (segnala a torto inset/text-wrap/background-clip/linear-gradient,
      # che sono CSS validi e moderni) -> non si puo' rendere strict senza falsi-rossi. I
      # rilievi HTML VERI (img src vuoto, div-in-label) sono gia' corretti; se rientrano si
      # vedono nel log. Guardiani strict veri: soldi/test/mutazione/atheris + zap-sul-grave.
      - name: Valida HTML5 + CSS delle pagine in deploy/ (report-only)
        run: html5validator --root deploy --also-check-css --show-warnings || true

  # ATHERIS: fuzzing coverage-guided sui motori-soldi. Un invariante rotto = job ROSSO
  # (bug vero). Gli invarianti sono gia' provati a mano su 222.400 giri -> niente falsi-rossi.
  atheris:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Python 3.11: su 3.9 non c'e' la wheel di Atheris e la build da sorgente fallisce
      # (usa Py_IsNone, funzione della CPython >=3.10). I motori-soldi sono Python puro:
      # stesso identico comportamento. clang resta come rete di sicurezza per la build.
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Dipendenze di build (fallback se manca la wheel)
        run: sudo apt-get update && sudo apt-get install -y clang
      - name: Installa Atheris
        run: pip install atheris
      - name: Fuzz motori-soldi (max 2 min; crash o invariante rotto = STOP)
        run: python collaudi/fuzz_soldi.py -max_total_time=120 -atheris_runs=500000

  # OWASP ZAP: scansione DAST BASELINE (passiva, NON attacca) del sito live. Gira solo su
  # schedule settimanale o avvio manuale -> niente crawl della produzione ad ogni commit.
  # Report-only (|| true): i rilievi restano nel log del job.
  zap:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      # STRICT sul GRAVE: -I fa si' che gli AVVISI non blocchino (al primo giro: 0 FAIL,
      # 59 PASS, 11 avvisi = header di hardening mancanti, non buchi). Esce non-zero SOLO
      # su un alert FAIL (vulnerabilita' vera). Niente mount: il report va su stdout.
      - name: OWASP ZAP Baseline sul sito live (STRICT - blocca solo su FAIL grave)
        run: |
          docker run --rm -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t https://bookinvip.com -I -a
